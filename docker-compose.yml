services:
  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      - "traefik.enable=false"

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.3.3.102-alpine
    restart: unless-stopped
    volumes:
      - event_data:/var/lib/clickhouse
      - event_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    labels:
      - "traefik.enable=false"

  plausible:
    image: ghcr.io/plausible/community-edition:${PLAUSIBLE_VERSION:-v2.1.4}
    restart: unless-stopped
    depends_on:
      - plausible_db
      - plausible_events_db
    environment:
      BASE_URL: https://${PLAUSIBLE_DOMAIN}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@plausible_db/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible
    networks:
      - web
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.plausible.rule=Host(`${PLAUSIBLE_DOMAIN}`)"
      - "traefik.http.routers.plausible.tls.certresolver=lets-encrypt"
      - "traefik.http.services.plausible.loadbalancer.server.port=8000"
      - "traefik.docker.network=web"

  plausible_exporter:
    image: ghcr.io/riesinger/plausible-exporter:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9877:9877"
    environment:
      PLAUSIBLE_HOST: http://plausible:8000
      PLAUSIBLE_TOKEN: ${PLAUSIBLE_API_KEY}
      PLAUSIBLE_SITE_IDS: ${PLAUSIBLE_SITE_IDS}
    labels:
      - "traefik.enable=false"

networks:
  web:
    external: true

volumes:
  db_data:
    name: plausible_db_data
  event_data:
    name: plausible_event_data
  event_logs:
    name: plausible_event_logs
