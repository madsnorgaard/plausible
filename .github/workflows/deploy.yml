name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      force_recreate:
        description: 'Force recreate containers'
        type: boolean
        default: false

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: madsnorgaard/contabo-infrastructure
          event-type: platform-deploy
          client-payload: |
            {
              "project_dir": "plausible",
              "project_type": "platform",
              "sync_code": "true",
              "sync_files": "docker-compose.yml",
              "force_recreate": "${{ inputs.force_recreate || false }}"
            }
